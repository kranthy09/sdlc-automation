<?xml version="1.0" encoding="UTF-8"?>
<svg id="p1" viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="260" rx="14" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>

  <!-- Title bar -->
  <text x="16" y="22" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#444441">Phase 1 — Ingestion Pipeline</text>
  <text x="704" y="22" text-anchor="end" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#73726c">RawUpload → ValidatedAtom[] + FlaggedAtom[]</text>

  <!-- ═══════════ ROW 1 ═══════════ -->

  <!-- Box 1: File Validate (guardrail) -->
  <rect x="16" y="38" width="155" height="78" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="0.5"/>
  <text x="93.5" y="58" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#7f1d1d">File Validate</text>
  <text x="93.5" y="74" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#991b1b">G1-lite guardrail</text>
  <text x="93.5" y="90" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#b91c1c">reject corrupt / oversized</text>

  <line x1="171" y1="77" x2="191" y2="77" marker-end="url(#a1)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 2: Doc Parse -->
  <rect x="193" y="38" width="155" height="78" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="0.5"/>
  <text x="270.5" y="58" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#1e3a5f">Doc Parse</text>
  <text x="270.5" y="74" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1d4ed8">Multimodal + legacy fallback</text>
  <text x="270.5" y="90" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#2563eb">PDF / Excel / Word → elements</text>

  <line x1="348" y1="77" x2="368" y2="77" marker-end="url(#a1)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 3: Column Map -->
  <rect x="370" y="38" width="155" height="78" rx="8" fill="#eff6ff" stroke="#1d4ed8" stroke-width="0.5"/>
  <text x="447.5" y="58" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#1e3a5f">Column Map</text>
  <text x="447.5" y="74" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1d4ed8">3-tier synonym resolution</text>
  <text x="447.5" y="90" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#2563eb">exact → fuzzy → spaCy NLP</text>

  <line x1="525" y1="77" x2="545" y2="77" marker-end="url(#a1)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 4: Guardrails -->
  <rect x="547" y="38" width="155" height="78" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="0.5"/>
  <text x="624.5" y="58" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#7f1d1d">Guardrails</text>
  <text x="624.5" y="74" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#991b1b">G3 injection + G2 PII</text>
  <text x="624.5" y="90" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#b91c1c">block attacks · redact PII</text>

  <!-- ═══ Connector row 1 → row 2 ═══ -->
  <path d="M625,116 V135 H94 V152" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- ═══════════ ROW 2 ═══════════ -->

  <!-- Box 5: Atomise + Classify (LLM) -->
  <rect x="16" y="154" width="155" height="78" rx="8" fill="#f5f3ff" stroke="#6d28d9" stroke-width="0.5"/>
  <text x="93.5" y="174" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#4c1d95">Atomise + Classify</text>
  <text x="93.5" y="190" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#6d28d9">LLM: split → atomic reqs</text>
  <text x="93.5" y="206" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#7c3aed">intent + D365 module tag</text>

  <line x1="171" y1="193" x2="191" y2="193" marker-end="url(#a1)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 6: Dedup -->
  <rect x="193" y="154" width="155" height="78" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.5"/>
  <text x="270.5" y="174" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#14532d">Dedup</text>
  <text x="270.5" y="190" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#16a34a">Cosine embedding similarity</text>
  <text x="270.5" y="206" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#15803d">&gt;0.92 merge · &gt;0.80 flag</text>

  <line x1="348" y1="193" x2="368" y2="193" marker-end="url(#a1)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 7: Quality Gate -->
  <rect x="370" y="154" width="155" height="78" rx="8" fill="#fefce8" stroke="#a16207" stroke-width="0.5"/>
  <text x="447.5" y="174" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#713f12">Quality Gate</text>
  <text x="447.5" y="190" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#a16207">Specificity + completeness</text>
  <text x="447.5" y="206" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#ca8a04">schema · MoSCoW · NER</text>

  <line x1="525" y1="193" x2="545" y2="193" marker-end="url(#a1)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 8: Output -->
  <rect x="547" y="154" width="155" height="78" rx="8" fill="#ecfdf5" stroke="#047857" stroke-width="0.5"/>
  <text x="624.5" y="174" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="12" font-weight="600" fill="#064e3b">Output</text>
  <text x="624.5" y="190" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="10" fill="#047857">ValidatedAtom[]</text>
  <text x="624.5" y="206" text-anchor="middle" font-family="var(--font-sans,system-ui)" font-size="9.5" fill="#059669">FlaggedAtom[]</text>
</svg>
