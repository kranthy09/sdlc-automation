<?xml version="1.0" encoding="UTF-8"?>
<svg id="p3" viewBox="0 0 720 246" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="246" rx="14" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>

  <!-- Title -->
  <text x="16" y="22" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#444441">Phase 3 — Semantic Matching · No LLM — all local (numpy + rapidfuzz)</text>

  <!-- ═══ ROW 1 ═══ -->

  <!-- Box 1: Batch Embed (purple — AI/ONNX) -->
  <rect x="16" y="42" width="200" height="68" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="116" y="62" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#3c3489">Batch Embed</text>
  <text x="116" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#534ab7">Single ONNX pass · all unique texts</text>
  <text x="116" y="96" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#534ab7">L2-normalise → dot-product cosine</text>

  <!-- Arrow 1→2 -->
  <line x1="216" y1="76" x2="236" y2="76" marker-end="url(#a3)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 2: 5-Signal Composite (purple — scoring engine) -->
  <rect x="238" y="42" width="222" height="68" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
  <text x="349" y="62" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#3c3489">5-Signal Composite</text>
  <text x="349" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#534ab7">cosine·0.25  entity·0.20  token·0.15</text>
  <text x="349" y="96" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#534ab7">history·0.25  rerank·0.15  FIT+0.10</text>

  <!-- Arrow 2→3 -->
  <line x1="460" y1="76" x2="480" y2="76" marker-end="url(#a3)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 3: Anomaly Detect (amber — quality gate) -->
  <rect x="482" y="42" width="222" height="68" rx="8" fill="#fef3e0" stroke="#c27803" stroke-width="0.5"/>
  <text x="593" y="62" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#92400e">Anomaly Detect</text>
  <text x="593" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#c27803">cosine > 0.85 + entity &lt; 0.20 → FLAG</text>
  <text x="593" y="96" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#c27803">catches false semantic matches</text>

  <!-- ═══ ROW CONNECTOR ═══ -->
  <path d="M704,76 L712,76 L712,128 L8,128 L8,186 L16,186" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- ═══ ROW 2 ═══ -->

  <!-- Box 4: Candidate Ranker (blue — data processing) -->
  <rect x="16" y="152" width="338" height="68" rx="8" fill="#e8f0fe" stroke="#3478f6" stroke-width="0.5"/>
  <text x="185" y="172" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#1a56db">Candidate Ranker</text>
  <text x="185" y="190" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#3478f6">Sort descending by composite score</text>
  <text x="185" y="206" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#3478f6">Dedup: cap cosine > 0.95 → drop lower duplicate</text>

  <!-- Arrow 4→5 -->
  <line x1="354" y1="186" x2="374" y2="186" marker-end="url(#a3)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 5: Route Assignment (green — output/routing) -->
  <rect x="376" y="152" width="328" height="68" rx="8" fill="#e6f4ea" stroke="#1e7e34" stroke-width="0.5"/>
  <text x="540" y="172" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#166534">Route Assignment</text>
  <text x="540" y="190" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1e7e34">FAST_TRACK > 0.85 + history present</text>
  <text x="540" y="206" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1e7e34">DEEP_REASON ≥ 0.60 · GAP_CONFIRM &lt; 0.60</text>

</svg>
