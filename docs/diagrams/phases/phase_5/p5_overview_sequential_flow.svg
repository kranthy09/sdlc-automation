<?xml version="1.0" encoding="UTF-8"?>
<svg id="p5" viewBox="0 0 720 246" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="246" rx="14" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>

  <!-- Title -->
  <text x="16" y="22" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#444441">Phase 5 — Validation &amp; Output · 2-pass: Sanity + HITL → Merge + Report + Write-back</text>

  <!-- ═══ ROW 1 — Sub-phase 5A: Sanity Gate + HITL ═══ -->

  <!-- Box 1: G10-lite Sanity Gate (amber — quality gate) -->
  <rect x="16" y="42" width="220" height="68" rx="8" fill="#fef3e0" stroke="#c27803" stroke-width="0.5"/>
  <text x="126" y="62" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#92400e">G10-lite Sanity Gate</text>
  <text x="126" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#c27803">8 rules: high-conf GAP · low-score FIT</text>
  <text x="126" y="96" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#c27803">PII leak · anomaly · no-config · all GAPs</text>

  <!-- Arrow 1→2 -->
  <line x1="236" y1="76" x2="256" y2="76" marker-end="url(#a5)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 2: HITL Interrupt (teal — human review) -->
  <rect x="258" y="42" width="210" height="68" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
  <text x="363" y="62" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#085041">HITL Interrupt</text>
  <text x="363" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#0f6e56">LangGraph interrupt() · PG checkpoint</text>
  <text x="363" y="96" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#0f6e56">Graph freezes until human resolves flags</text>

  <!-- Arrow 2→3 -->
  <line x1="468" y1="76" x2="488" y2="76" marker-end="url(#a5)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 3: Merge Overrides (blue — data processing) -->
  <rect x="490" y="42" width="214" height="68" rx="8" fill="#e8f0fe" stroke="#3478f6" stroke-width="0.5"/>
  <text x="597" y="62" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#1a56db">Merge Overrides</text>
  <text x="597" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#3478f6">Apply reviewer decisions to flagged atoms</text>
  <text x="597" y="96" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#3478f6">Override → new verdict · Approve → keep</text>

  <!-- ═══ ROW CONNECTOR ═══ -->
  <path d="M704,76 L712,76 L712,128 L8,128 L8,186 L16,186" fill="none" stroke="#73726c" stroke-width="1.5" marker-end="url(#a5)"/>

  <!-- ═══ ROW 2 — Sub-phase 5B: Build + Report + Write-back ═══ -->

  <!-- Box 4: Build Batch (blue — data processing) -->
  <rect x="16" y="152" width="200" height="68" rx="8" fill="#e8f0fe" stroke="#3478f6" stroke-width="0.5"/>
  <text x="116" y="172" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#1a56db">Build Batch</text>
  <text x="116" y="190" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#3478f6">ValidatedFitmentBatch assembly</text>
  <text x="116" y="206" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#3478f6">FIT + PARTIAL + GAP + REVIEW counts</text>

  <!-- Arrow 4→5 -->
  <line x1="216" y1="186" x2="236" y2="186" marker-end="url(#a5)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 5: FDD CSV Report (green — output) -->
  <rect x="238" y="152" width="224" height="68" rx="8" fill="#e6f4ea" stroke="#1e7e34" stroke-width="0.5"/>
  <text x="350" y="172" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#166534">FDD CSV Report</text>
  <text x="350" y="190" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1e7e34">fdd_fits + fdd_gaps · stdlib csv</text>
  <text x="350" y="206" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1e7e34">G2 PII de-redaction via restore_pii()</text>

  <!-- Arrow 5→6 -->
  <line x1="462" y1="186" x2="482" y2="186" marker-end="url(#a5)" stroke="#73726c" stroke-width="1.5"/>

  <!-- Box 6: pgvector Write-back (green — output) -->
  <rect x="484" y="152" width="220" height="68" rx="8" fill="#e6f4ea" stroke="#1e7e34" stroke-width="0.5"/>
  <text x="594" y="172" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="13" font-weight="500" fill="#166534">pgvector Write-back</text>
  <text x="594" y="190" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1e7e34">Batch embed + save_fitment per atom</text>
  <text x="594" y="206" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans,system-ui)" font-size="10" fill="#1e7e34">Skip REVIEW · CompleteEvent → Redis</text>

</svg>
