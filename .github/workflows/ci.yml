name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ---------------------------------------------------------------------------
# Three-job pipeline:
#
#   quality      Lint + contracts + unit tests   (no services, fast)
#   integration  Integration tests               (Postgres, Redis, Qdrant)
#   ui           TypeScript type-check + Vitest   (Node.js, no services)
#
# All layers complete:
#   Layer 0  DONE — scaffold + CI
#   Layer 1  DONE — platform schemas
#   Layer 2  DONE — 13 platform utilities + guardrail utilities
#   Layer 3  DONE — REQFIT 5-phase LangGraph pipeline
#   Layer 4  DONE — FastAPI + Celery + WebSocket + React UI
# ---------------------------------------------------------------------------

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — fast, no services
  # ---------------------------------------------------------------------------
  quality:
    name: Lint + Contracts + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12 && uv python pin 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff + mypy)
        run: make lint

      - name: Validate import contracts
        run: make validate-contracts

      - name: Unit tests
        run: |
          uv run pytest -m unit -v --tb=short \
            --cov=platform --cov=modules --cov=agents \
            --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 2 — integration tests with real infrastructure
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ai_platform_test
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U platform -d ai_platform_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]

    env:
      POSTGRES_URL: postgresql+asyncpg://platform:test_password@localhost/ai_platform_test
      REDIS_URL: redis://localhost:6379/0
      QDRANT_URL: http://localhost:6333

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12 && uv python pin 3.12

      - name: Install dependencies (core + dev + ML extras)
        # ML extras: qdrant-client, fastembed (ONNX Runtime), rank-bm25, spacy, rapidfuzz
        run: uv sync --extra dev --extra ml

      - name: Wait for Qdrant
        run: |
          curl --retry 30 --retry-delay 2 --retry-connrefused \
               --silent --fail --output /dev/null \
               http://localhost:6333/healthz
          echo "Qdrant is ready."

      - name: Integration tests
        run: |
          uv run pytest -m integration -v --tb=short \
            --cov=platform --cov=modules --cov=agents \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Job 3 — UI type-check + tests (runs in parallel with integration)
  # ---------------------------------------------------------------------------
  ui:
    name: UI Type Check + Tests
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Vitest tests
        run: npm test
