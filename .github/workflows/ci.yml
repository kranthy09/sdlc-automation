name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# ---------------------------------------------------------------------------
# Layer 0 CI — runs fast with no service containers.
# Each layer unlocks the next block:
#   Layer 0: lint + contracts + unit tests         (this file, no services)
#   Layer 2: add service containers + integration tests when platform/ is built
#   Layer 3: add golden fixture replay when modules/dynafit/ is built
# ---------------------------------------------------------------------------

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  quality:
    name: Lint + Contracts + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        # core + dev only — no heavy ML stack (ml extra added in Layer 2)
        run: uv sync --extra dev

      - name: Lint (ruff + mypy)
        run: make lint

      - name: Validate import contracts
        run: make validate-contracts

      - name: Unit tests
        run: uv run pytest -m unit -v --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
