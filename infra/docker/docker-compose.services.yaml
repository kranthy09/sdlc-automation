# Minimal backing services for local development.
# Run:  make services
# Stop: make services-down
#
# FastAPI  → make run        (port 8000)
# Vite UI  → make ui         (port 5173)
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: platform_postgres
    environment:
      POSTGRES_DB: ai_platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d ai_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: platform_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  pg_data:
  redis_data:
  qdrant_data:
