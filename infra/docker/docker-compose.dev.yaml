# Full dev stack — backing services + observability + API + Worker + UI
# make dev-full      → start (builds images)
# make dev-full-down → stop
#
# URLs once running:
#   UI          http://localhost:5173
#   API docs    http://localhost:8000/api/docs
#   API health  http://localhost:8000/health
#   Qdrant      http://localhost:6333/dashboard
#   Langfuse    http://localhost:3000
#   Grafana     http://localhost:3001

services:
  # ------------------------------------------------------------------
  # Backing services
  # ------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: platform_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: platform_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 15s
      timeout: 10s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: platform_langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${LANGFUSE_DATABASE_URL}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL}
      SALT: ${LANGFUSE_SALT}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: platform_celery_exporter
    command: ["--broker-url=redis://redis:6379/0"]
    ports:
      - "9808:9808"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: platform_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: platform_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ------------------------------------------------------------------
  # API (FastAPI + uvicorn)
  # ------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: platform_api
    # Override CMD to enable hot-reload in dev, scoped to source dirs only.
    # Scoping avoids spurious reloads from .venv or build artefacts.
    command:
      - uv
      - run
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/api
      - --reload-dir
      - /app/platform
      - --reload-dir
      - /app/modules
      - --reload-dir
      - /app/agents
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      QDRANT_URL: ${QDRANT_URL}
      ORT_LOGGING_LEVEL: "3"
    volumes:
      - ../../api:/app/api:ro
      - ../../platform:/app/platform:ro
      - ../../modules:/app/modules:ro
      - ../../agents:/app/agents:ro
      - ../../infra:/app/infra:ro
      - ../../knowledge_bases:/app/knowledge_bases:ro
      - reports:/app/reports
      - uploads:/tmp/dynafit_uploads
      - fastembed_cache:/tmp/fastembed_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------------
  # Celery worker
  # ------------------------------------------------------------------
  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: platform_worker
    command: ["uv", "run", "celery", "-A", "api.workers.tasks", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - ../../.env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      QDRANT_URL: ${QDRANT_URL}
      PYTHONPATH: /app
      ORT_LOGGING_LEVEL: "3"
    volumes:
      - ../../api:/app/api:ro
      - ../../platform:/app/platform:ro
      - ../../modules:/app/modules:ro
      - ../../agents:/app/agents:ro
      - uploads:/tmp/dynafit_uploads
      - reports:/app/reports
      - fastembed_cache:/tmp/fastembed_cache
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ------------------------------------------------------------------
  # UI (Vite React dev server)
  # ------------------------------------------------------------------
  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile
    container_name: platform_ui
    ports:
      - "5173:5173"
    environment:
      # In Docker the UI container must proxy to the api service by name.
      # Override via .env only when running Vite outside Docker (http://localhost:8000).
      VITE_API_TARGET: ${VITE_API_TARGET:-http://api:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  reports:
  uploads:
  fastembed_cache:
