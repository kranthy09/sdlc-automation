# Dev stack — backing services + API + Worker + UI
# make dev       → start containers (no rebuild; live via volume mounts + Vite HMR)
# make dev-build → rebuild images then start (use after dep/Dockerfile changes)
# make dev-down  → stop (volumes preserved)
# make dev-down-v → stop + wipe all volumes (full reset)
#
# URLs once running:
#   UI          http://localhost:5173
#   API docs    http://localhost:8000/api/docs
#   API health  http://localhost:8000/health
#   Qdrant      http://localhost:6333/dashboard

services:
  # ------------------------------------------------------------------
  # Backing services
  # ------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: platform_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: platform_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ------------------------------------------------------------------
  # API (FastAPI + uvicorn)
  # ------------------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: enterprise-ai-backend
    container_name: platform_api
    # Override CMD to enable hot-reload in dev, scoped to source dirs only.
    # Scoping avoids spurious reloads from .venv or build artefacts.
    command:
      - uv
      - run
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/api
      - --reload-dir
      - /app/platform
      - --reload-dir
      - /app/modules
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      QDRANT_URL: ${QDRANT_URL}
      ORT_LOGGING_LEVEL: "3"
      INGESTION_ARTIFACT_STORE_ROOT: /app/data/artifacts
    volumes:
      - ../../api:/app/api:ro
      - ../../platform:/app/platform:ro
      - ../../modules:/app/modules:ro
      - ../../infra:/app/infra:ro
      - ../../knowledge_bases:/app/knowledge_bases:ro
      - reports:/app/reports
      - uploads:/tmp/dynafit_uploads
      - artifacts:/app/data/artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ------------------------------------------------------------------
  # Celery worker
  # ------------------------------------------------------------------
  worker:
    image: enterprise-ai-backend
    pull_policy: never
    container_name: platform_worker
    command: ["uv", "run", "celery", "-A", "api.workers.tasks", "worker", "--loglevel=info", "--concurrency=2"]
    env_file:
      - ../../.env
    environment:
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      QDRANT_URL: ${QDRANT_URL}
      PYTHONPATH: /app
      ORT_LOGGING_LEVEL: "3"
      INGESTION_ARTIFACT_STORE_ROOT: /app/data/artifacts
    volumes:
      - ../../api:/app/api:ro
      - ../../platform:/app/platform:ro
      - ../../modules:/app/modules:ro
      - uploads:/tmp/dynafit_uploads
      - reports:/app/reports
      - artifacts:/app/data/artifacts
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ------------------------------------------------------------------
  # UI (Vite React dev server)
  # ------------------------------------------------------------------
  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile
    container_name: platform_ui
    ports:
      - "5173:5173"
    environment:
      # In Docker the UI container must proxy to the api service by name.
      # Override via .env only when running Vite outside Docker (http://localhost:8000).
      VITE_API_TARGET: ${VITE_API_TARGET:-http://api:8000}
    # Mount source so Vite HMR picks up changes without image rebuild.
    # node_modules stays in the image — only source files are overlaid.
    volumes:
      - ../../ui/src:/app/src:ro
      - ../../ui/index.html:/app/index.html:ro
      - ../../ui/public:/app/public:ro
      - ../../ui/vite.config.ts:/app/vite.config.ts:ro
      - ../../ui/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ../../ui/postcss.config.js:/app/postcss.config.js:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pg_data:
  redis_data:
  qdrant_data:
  reports:
  uploads:
  artifacts:
